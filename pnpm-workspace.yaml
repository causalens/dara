packages:
  - "packages/**"
minimumReleaseAge: 1440
minimumReleaseAgeStrict: true
blockExoticSubdeps: true
allowBuilds:
  '@fortawesome/fontawesome-common-types': true
  '@fortawesome/fontawesome-free': true
  '@fortawesome/fontawesome-svg-core': true
  '@fortawesome/free-brands-svg-icons': true
  '@fortawesome/free-regular-svg-icons': true
  '@fortawesome/free-solid-svg-icons': true
  cypress: true
  esbuild: true
  msw: true
  nx: true
minimumReleaseAgeExclude:
  - "@darajs/*"
packageExtensions:
  '@cl/styled-components':
    dependencies:
      react-dom: ^18.2
  styled-components:
    dependencies:
      react-is: ^18.2
  '@darajs/ui-components':
    dependencies:
      '@fortawesome/fontawesome-svg-core': ~6.4.0
  react-markdown:
    dependencies:
      '@types/react': 18.2.60
patchedDependencies:
  tinykeys: patches/tinykeys.patch
overrides:
  form-data: '>=4.0.4 <5'
  minimatch@>=10: '>=10.2.5 <11'
  qs: '>=6.15.2 <7'
linkWorkspacePackages: true
shamefullyHoist: true
