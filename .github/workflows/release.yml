name: package and publish

on:
  push:
    tags:
      - v*
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - labeled

permissions:
  id-token: write  # Required for OIDC and npm trusted publishing
  contents: write  # The action-gh-release needs this to write to the release

jobs:
  package-and-publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          # Use a PAT with admin privileges, so we can push to main the changes to changelog, lock and toml.
          # https://github.community/t/how-to-push-to-protected-branches-in-a-github-action/16101/34
          token: ${{ secrets.GH_ACTIONS_KEY }}
          fetch-depth: 0  # 0 fetches all history, apparently needed for push:
      - name: Extract branch name
        # This is required for pushing the changes to version, lock and changelog to the correct branch.
        id: extract_branch
        shell: bash
        run: |
          echo "ref" $REF
          raw=$(git branch -r --contains $REF | grep -v '\->')
          echo "raw" $raw
          processed=$(echo $raw | awk '{print $1;}')
          echo "processed" $processed
          branch=${processed/origin\/}
          echo "branch=$branch" >> $GITHUB_OUTPUT
          echo "HEAD:$branch" | tr -d '[:space:]'
      - name: Setup git config
        run: |
          git config --global --add safe.directory /__w/dara/dara
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - uses: snok/install-poetry@v1
        with:
          version: 1.8.3
      - name: Install Anthology
        run: poetry self add anthology
      - name: Setup cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
            path: .venv
            key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install Python venv if cache was not found
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: |
            poetry anthology install
      - name: Link venvs if cache was hit
        if: steps.cached-poetry-dependencies.outputs.cache-hit == 'true'
        run: make link
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
            node-version: 24
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install project dependencies
        run: make deps-project
      # Extract current and tag versions so that we can do version bump in the right places.
      - name: Extract tags (versions)
        id: extract_tag
        shell: bash
        run: |
            # Extract previous (current) tag from the lerna.json file
            previous_tag=v$(sed -n 's/.*"version": "\(.*\)".*/\1/p' lerna.json)
            echo "previous_tag=$previous_tag" >> $GITHUB_OUTPUT
            tag=$(git describe --tags --exact-match $GITHUB_SHA)
            # Remove the v prefix
            version=${tag#v}
            echo "tag=$tag" >> $GITHUB_OUTPUT
            echo "version=$version" >> $GITHUB_OUTPUT
      - name: Set versions for JS and Python packages
        shell: bash
        run: |
          poetry anthology version ${{ steps.extract_tag.outputs.version }}
          poetry anthology install
          pnpm lerna version ${{ steps.extract_tag.outputs.version }} --no-private --no-git-tag-version --force-publish --exact --yes
          pnpm i --lockfile-only
      - name: Parse and resolve changelog
        id: set-changelog
        run: |
          changelog=$(tooling/changelog-parser/main.js ${{ steps.extract_tag.outputs.version }})
          echo "changelog=$changelog" >> $GITHUB_OUTPUT
      - name: Update READMEs to work on PyPi before publishing
        run: |
          poetry run python ./tooling/scripts/update-readmes.py ${{ github.ref_name }}
      - name: Prepare resources required for packaging
        run: make prepare
      - name: Make packages
        run: poetry anthology run package
      - name: Publish packages
        run: make publish
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          VERSION_TAG: ${{ steps.extract_tag.outputs.tag }}
      - name: Package and Publish Docs
        run: make publish-docs
        env:
          PROJECT: causalens-internal
          LOCATION: us-central1
          REPOSITORY: documentation
          PACKAGE: dara
          GAR_USERNAME: _json_key
          GAR_KEY_JSON: '${{ secrets.GAR_KEY_JSON }}'
          POETRY_HTTP_BASIC_CAUSALENS_USERNAME: _json_key
          POETRY_HTTP_BASIC_CAUSALENS_PASSWORD: '${{ secrets.GAR_KEY_JSON }}'
          VERSION: ${{ steps.extract_tag.outputs.version }}

      - name: Push a committed version bump
        run: |
              git push origin $(echo "HEAD:$BRANCH" | tr -d '[:space:]')
              # Move the tag to the new commit
              git push --delete origin ${{ steps.extract_tag.outputs.tag }}
              git tag -fa ${{ steps.extract_tag.outputs.tag }} -m "Update tag"
              git push origin ${{ steps.extract_tag.outputs.tag }}
        env:
          GH_PAT: '${{ secrets.GH_ACTIONS_KEY }}'
          GH_USERNAME: 'sam-causalens'
          BRANCH: ${{ steps.extract_branch.outputs.branch }}
      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
            token: ${{ secrets.GITHUB_TOKEN }}
            fromTag: ${{ steps.extract_tag.outputs.previous_tag }}
            configurationJson: |
                {
                  "categories": [
                      {
                        "title": "## 🚀 Features",
                        "labels": ["Feat", "Feature"]
                      },
                      {
                        "title": "## 📈 Improvements",
                        "labels": ["Improvement"]
                      },
                      {
                        "title": "## 🐛 Fixes",
                        "labels": ["Fix", "Bugfix"]
                      },
                      {
                        "title": "## 📦 Other",
                        "labels": []
                      }
                  ],
                  "label_extractor": [
                      {
                          "on_property": "title",
                          "pattern": "^([^:]*):.*$",
                          "target": "$1"
                      }
                  ]
                }
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: ${{steps.build_changelog.outputs.changelog}}

      - uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              username: 'action-slack',
              blocks: [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Dara changelog for tag ${{ steps.extract_tag.outputs.version }}"
                  }
                },
                ...JSON.parse(${{ toJSON(steps.set-changelog.outputs.changelog) }})
                  .map(section => ({
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": section
                      }
                  }))
              ]
            }
        env:
          SLACK_WEBHOOK_URL: "${{ secrets.SLACK_TECH_TEAM_CHANNEL_WEBHOOK }}"

  recover-npm-publish:
    if: github.event_name == 'pull_request' && github.head_ref == 'codex/npm-release-recovery'
    runs-on: ubuntu-latest
    env:
      NPM_RECOVERY_VERSION: "1.27.0"
      NPM_RECOVERY_PUBLISH: ${{ contains(github.event.pull_request.labels.*.name, 'release:publish-npm') }}
    steps:
      - name: Checkout release bump
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
            node-version: 24
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install project dependencies
        run: make deps-project
      - name: Extract tags (versions)
        id: extract_tag
        shell: bash
        run: |
          echo "version=$NPM_RECOVERY_VERSION" >> $GITHUB_OUTPUT
      - name: Validate recovery version
        shell: bash
        run: |
          package_version=$(node -p "require('./lerna.json').version")
          if [ "$package_version" != "$NPM_RECOVERY_VERSION" ]; then
            echo "Requested npm recovery for $NPM_RECOVERY_VERSION, but lerna.json is $package_version"
            exit 1
          fi
      - name: Parse and resolve changelog
        id: set-changelog
        run: |
          changelog=$(tooling/changelog-parser/main.js ${{ steps.extract_tag.outputs.version }})
          echo "changelog=$changelog" >> $GITHUB_OUTPUT
      - name: Find missing npm packages
        id: npm-missing
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const { spawnSync } = require('child_process');

          const packageDirs = fs.readdirSync('packages')
            .map((name) => path.join('packages', name))
            .filter((packageDir) => fs.existsSync(path.join(packageDir, 'package.json')));
          const missing = [];
          const unexpectedFailures = [];

          for (const packageDir of packageDirs) {
            const packageJson = JSON.parse(fs.readFileSync(path.join(packageDir, 'package.json'), 'utf8'));
            if (packageJson.private) {
              continue;
            }

            const spec = `${packageJson.name}@${packageJson.version}`;
            const result = spawnSync(
              'npm',
              ['view', '--registry=https://registry.npmjs.org/', spec, 'version', '--json'],
              { encoding: 'utf8' }
            );

            if (result.status === 0) {
              console.log(`${spec} already published`);
              continue;
            }

            if (result.stderr.includes('E404')) {
              missing.push(spec);
              console.log(`${spec} missing`);
              continue;
            }

            unexpectedFailures.push(`${spec}: ${result.stderr || result.stdout}`);
          }

          if (unexpectedFailures.length > 0) {
            console.error(unexpectedFailures.join('\n'));
            process.exit(1);
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `missing_count=${missing.length}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `missing_packages=${missing.join(',')}\n`);
          NODE
      - name: Build JavaScript packages
        if: steps.npm-missing.outputs.missing_count != '0'
        run: make prepare
      - name: Publish missing npm packages
        if: env.NPM_RECOVERY_PUBLISH == 'true' && steps.npm-missing.outputs.missing_count != '0'
        shell: bash
        run: |
          pnpm lerna publish from-package --yes --no-git-reset --no-push --no-git-tag-version
      - uses: 8398a7/action-slack@v3
        if: env.NPM_RECOVERY_PUBLISH == 'true' && steps.npm-missing.outputs.missing_count != '0'
        with:
          status: custom
          custom_payload: |
            {
              username: 'action-slack',
              blocks: [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Dara changelog for tag ${{ steps.extract_tag.outputs.version }}"
                  }
                },
                ...JSON.parse(${{ toJSON(steps.set-changelog.outputs.changelog) }})
                  .map(section => ({
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": section
                      }
                  }))
              ]
            }
        env:
          SLACK_WEBHOOK_URL: "${{ secrets.SLACK_TECH_TEAM_CHANNEL_WEBHOOK }}"
      - name: Skip publish
        if: env.NPM_RECOVERY_PUBLISH != 'true'
        run: |
          echo "Validated npm recovery for: ${{ steps.npm-missing.outputs.missing_packages }}"
          echo "Add the release:publish-npm label to publish missing packages."
